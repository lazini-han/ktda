<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 보드게임 페스타 - 작가존</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'Noto Sans KR','Malgun Gothic',sans-serif;background:#f5f5f5;color:#333}
  .sticky-header{position:sticky;top:0;z-index:100;max-width:720px;margin:0 auto}

  /* 상단 바 */
  .top-bar{
    background:#e91e63;color:#fff;
    font-size:15px;font-weight:700;
    padding:13px 16px;
    box-shadow:none;
    display:flex;align-items:center;
  }
  .sort-group{
    position:absolute;right:12px;
    display:flex;gap:0;border-radius:8px;overflow:hidden;
  }
  .sort-btn{
    background:rgba(255,255,255,.2);color:rgba(255,255,255,.6);
    border:none;
    font-size:11px;font-weight:700;
    padding:5px 10px;cursor:pointer;
    transition:background .15s,color .15s;
  }
  .sort-btn:active{background:rgba(255,255,255,.4)}
  .sort-btn.active{background:#fff;color:#e91e63}

  /* 메인 배너 */
  .banner{width:100%;max-width:720px;margin:0 auto;display:block}
  .banner img{width:100%;display:block}

  /* 행사 안내 오버레이 */
  .info-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.7);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .25s;
  }
  .info-overlay.open{opacity:1;pointer-events:auto}
  .info-overlay-inner{
    width:92%;max-width:540px;background:#fff;border-radius:16px;
    overflow:hidden;position:relative;
    transform:translateY(30px);transition:transform .25s;
    text-align:center;padding-bottom:20px;
  }
  .info-overlay.open .info-overlay-inner{transform:translateY(0)}
  .info-overlay-inner img.info-festa{width:100%;display:block}
  .info-overlay-inner h2{font-size:clamp(20px, 4vw, 28px);font-weight:800;color:#e91e63;margin:16px 0 12px}
  .info-overlay-inner p{font-size:clamp(14px, 2.5vw, 18px);color:#555;line-height:1.8;padding:0 16px}
  .info-overlay-close{
    position:absolute;top:10px;right:10px;
    width:32px;height:32px;border-radius:50%;border:none;
    background:rgba(0,0,0,.5);color:#fff;font-size:18px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }

  /* 서브 바 - 상단바 아래 고정 */
  .sub-bar{
    display:flex;background:#fff;border-bottom:1px solid #ddd;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
  }
  .sub-bar button{
    flex:1;padding:10px 0;border:none;background:none;
    font-size:13px;font-weight:600;color:#666;cursor:pointer;
    transition:color .15s,background .15s;
    border-right:1px solid #eee;
  }
  .sub-bar button:last-child{border-right:none}
  .sub-bar button:active{background:#f5f5f5}
  .sub-bar button.tab-active{color:#e91e63;background:#fff0f5;box-shadow:inset 0 -2px 0 #e91e63}
  .sub-bar .divider{width:1px;background:#ddd}

  /* 컨텐츠 영역 */
  .content{max-width:720px;margin:0 auto}

  /* 부스 카드 그리드 */
  .booth-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
    align-items:start;
  }
  .booth-card{
    background:#fff;border-radius:12px;overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    transition:transform .15s;
  }
  .booth-card:active{transform:scale(.97)}
  .booth-card .thumb{
    width:100%;aspect-ratio:1/1;object-fit:cover;display:block;
    background:#eee;
  }
  .booth-card .info{padding:10px 12px 14px}
  .booth-card .booth-number{
    display:inline-block;background:#e91e63;color:#fff;
    font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;
    margin-bottom:4px;
  }
  .booth-card .game-name{font-size:15px;font-weight:700;margin-bottom:2px;line-height:1.3}
  .booth-card .booth-name{font-size:12px;color:#888;margin-bottom:6px}
  .booth-card .desc{font-size:12px;color:#555;line-height:1.5;
    max-height:2.95em;overflow:hidden;
    transition:max-height .25s ease;
    cursor:pointer;
  }
  .booth-card.expanded .desc{
    max-height:500px;
  }

  /* 방문 후기 카드 */
  .memo-card .thumb{background:#faf7e6;cursor:pointer}

  /* 방문 후기 오버레이 */
  .memo-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.75);
    overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:16px 16px 32px;
    opacity:0;pointer-events:none;
    transition:opacity .25s;
  }
  .memo-overlay.open{opacity:1;pointer-events:auto}
  .memo-overlay-inner{
    width:100%;max-width:480px;margin:0 auto;
    background:#fff;border-radius:16px;
    overflow:hidden;position:relative;
    transform:translateY(30px);transition:transform .25s;
  }
  .memo-overlay.open .memo-overlay-inner{transform:translateY(0)}
  .memo-overlay-inner img{width:100%;display:block;background:#faf7e6}
  .memo-overlay-body{padding:16px 18px 20px}
  .memo-overlay-body .games-label{font-size:15px;font-weight:800;color:#e91e63;margin-bottom:4px}
  .memo-overlay-body .games{font-size:14px;font-weight:700;color:#333;line-height:1.5;margin-bottom:10px}
  .memo-overlay-body .comment{font-size:14px;color:#333;line-height:1.6;white-space:pre-wrap;word-break:break-word}
  .memo-overlay-close{
    position:absolute;top:10px;right:10px;
    width:34px;height:34px;border-radius:50%;border:none;
    background:rgba(0,0,0,.55);color:#fff;font-size:20px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    z-index:1;
  }

  /* 탭 패널 */
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  /* 지도 오버레이 */
  .map-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.7);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .25s;
  }
  .map-overlay.open{opacity:1;pointer-events:auto}
  .map-overlay-inner{
    width:92%;max-width:540px;background:#fff;border-radius:16px;
    overflow:hidden;position:relative;
    transform:translateY(30px);transition:transform .25s;
  }
  .map-overlay.open .map-overlay-inner{transform:translateY(0)}
  .map-overlay-inner img{width:100%;display:block}
  .map-overlay-info{text-align:center;padding:14px 12px;font-size:14px;color:#666;line-height:1.6}
  .map-overlay-close{
    position:absolute;top:10px;right:10px;
    width:32px;height:32px;border-radius:50%;border:none;
    background:rgba(0,0,0,.5);color:#fff;font-size:18px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }

  /* 모바일 1열 (부스 목록은 가로형 카드) */
  @media(max-width:420px){
    .booth-grid{grid-template-columns:1fr;gap:10px;padding:10px}
    .booth-card{display:flex;flex-direction:row}
    .booth-card .thumb{width:120px;min-width:120px;height:120px;object-fit:cover;border-radius:0}
    .booth-card .info{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px}
  }

  /* 방문 후기는 모든 화면에서 3열 세로형 카드 */
  #memoGrid{grid-template-columns:repeat(3,1fr);gap:10px;padding:10px}
  #memoGrid .memo-card{display:block}
  #memoGrid .memo-card .thumb{width:100%;min-width:0;height:auto;aspect-ratio:1/1;border-radius:0;object-fit:cover}

  /* 태블릿 이상 3열 */
  @media(min-width:600px){
    .booth-grid{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>
<body>

<div class="sticky-header">

const grid=document.getElementById('boothGrid');
const sortBtns=document.querySelectorAll('.sort-btn');
let sortMode=localStorage.getItem('sortMode')||'random';

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderGrid(){
  grid.innerHTML='';
  const list=sortMode==='number'?[...booths]:shuffle(booths);
  list.forEach(b=>{
    const card=document.createElement('div');
    card.className='booth-card';
    card.innerHTML=`
      <img class="thumb" src="${b.img}" alt="${b.game}" loading="lazy">
      <div class="info">
        <span class="booth-number">${b.n}번</span>
        <div class="game-name">${b.game}</div>
        <div class="booth-name">${b.booth}</div>
        <div class="desc">${b.desc}</div>
      </div>`;
    grid.appendChild(card);
  });
  sortBtns.forEach(b=>{
    b.classList.toggle('active',b.dataset.sort===sortMode);
  });
}

sortBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    sortMode=btn.dataset.sort;
    localStorage.setItem('sortMode',sortMode);
    renderGrid();
  });
});

renderGrid();

// 카드 클릭 시 텍스트 펼치기/접기
grid.addEventListener('click',e=>{
  const card=e.target.closest('.booth-card');
  if(!card) return;
  card.classList.toggle('expanded');
  card.style.overflow='hidden';
  void card.offsetHeight;
  card.style.overflow='';
});

// 방문 후기 그리드 렌더
const memoGrid=document.getElementById('memoGrid');
function renderMemos(){
  memoGrid.innerHTML='';
  shuffle(memos).forEach(m=>{
    const card=document.createElement('div');
    card.className='booth-card memo-card';
    const commentHtml=m.c?`<div class="comment">${m.c.replace(/</g,'&lt;')}</div>`:'';
    card.dataset.idx=memos.indexOf(m);
    card.innerHTML=`<img class="thumb" src="postits/${m.n}.jpg" alt="방문 후기 ${m.n}" loading="lazy">`;
    memoGrid.appendChild(card);
  });
}
renderMemos();

// 방문 후기 오버레이
const memoOverlay=document.getElementById('memoOverlay');
const memoOverlayImg=document.getElementById('memoOverlayImg');
const memoOverlayGames=document.getElementById('memoOverlayGames');
const memoOverlayComment=document.getElementById('memoOverlayComment');
memoGrid.addEventListener('click',e=>{
  const card=e.target.closest('.booth-card');
  if(!card) return;
  const m=memos[+card.dataset.idx];
  memoOverlayImg.src=`postits/${m.n}.jpg`;
  memoOverlayGames.textContent=m.g;
  memoOverlayComment.textContent=m.c||'';
  memoOverlayComment.style.display=m.c?'':'none';
  memoOverlay.classList.add('open');
  memoOverlay.scrollTop=0;
  document.body.style.overflow='hidden';
});
function closeMemoOverlay(){memoOverlay.classList.remove('open');document.body.style.overflow=''}
document.getElementById('memoClose').addEventListener('click',closeMemoOverlay);
memoOverlay.addEventListener('click',e=>{if(e.target===memoOverlay)closeMemoOverlay()});

// 탭 전환
const tabBtns=document.querySelectorAll('.sub-bar button[data-tab]');
const sortGroup=document.querySelector('.sort-group');
tabBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    tabBtns.forEach(b=>b.classList.remove('tab-active'));
    btn.classList.add('tab-active');
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    document.getElementById(btn.dataset.tab).classList.add('active');
    sortGroup.style.display=btn.dataset.tab==='tab-booths'?'':'none';
    window.scrollTo({top:0,behavior:'instant'});
  });
});

// 행사 안내 오버레이
const infoOverlay=document.getElementById('infoOverlay');
document.getElementById('infoBtn').addEventListener('click',()=>infoOverlay.classList.add('open'));
document.getElementById('infoClose').addEventListener('click',()=>infoOverlay.classList.remove('open'));
infoOverlay.addEventListener('click',e=>{if(e.target===infoOverlay)infoOverlay.classList.remove('open')});

// 지도 오버레이
const overlay=document.getElementById('mapOverlay');
document.getElementById('mapBtn').addEventListener('click',()=>overlay.classList.add('open'));
document.getElementById('mapClose').addEventListener('click',()=>overlay.classList.remove('open'));
overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('open')});
</script>
