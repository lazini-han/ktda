<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 보드게임 페스타 - 작가존</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'Noto Sans KR','Malgun Gothic',sans-serif;background:#f5f5f5;color:#333;padding-bottom:70px;padding-top:48px}

  /* 상단 바 */
  .top-bar{
    position:fixed;top:0;left:0;right:0;z-index:100;
    max-width:720px;margin:0 auto;
    background:#e91e63;color:#fff;
    text-align:center;font-size:15px;font-weight:700;
    padding:13px 16px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
    display:flex;align-items:center;justify-content:center;
  }
  .sort-group{
    position:absolute;right:12px;
    display:flex;gap:0;border-radius:8px;overflow:hidden;
  }
  .sort-btn{
    background:rgba(255,255,255,.2);color:rgba(255,255,255,.6);
    border:none;
    font-size:11px;font-weight:700;
    padding:5px 10px;cursor:pointer;
    transition:background .15s,color .15s;
  }
  .sort-btn:active{background:rgba(255,255,255,.4)}
  .sort-btn.active{background:#fff;color:#e91e63}

  /* 메인 배너 */
  .banner{width:100%;max-width:720px;margin:0 auto;display:block}
  .banner img{width:100%;display:block}

  /* 행사 안내 탭 */
  .info-page{
    min-height:calc(100vh - 48px - 56px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px 20px;text-align:center;
  }
  .info-page img{width:90%;max-width:640px;display:block;margin-bottom:24px}
  .info-page h2{font-size:clamp(20px, 4vw, 28px);font-weight:800;color:#e91e63;margin-bottom:16px}
  .info-page p{font-size:clamp(14px, 2.5vw, 18px);color:#555;line-height:1.8}

  /* 탭 네비게이션 - 하단 고정 */
  .tab-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:100;
    display:flex;background:#fff;border-top:1px solid #ddd;
    max-width:720px;margin:0 auto;
    box-shadow:0 -2px 8px rgba(0,0,0,.1);
  }
  .tab-bar button{
    flex:1;padding:12px 0;border:none;background:none;
    font-size:15px;font-weight:600;color:#999;cursor:pointer;
    transition:color .2s,border-color .2s;
    border-top:3px solid transparent;
  }
  .tab-bar button.active{color:#e91e63;border-top-color:#e91e63}

  /* 컨텐츠 영역 */
  .content{max-width:720px;margin:0 auto}
  .tab-panel{display:none}
  .tab-panel.active{display:block}

  /* 부스 카드 그리드 */
  .booth-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    padding:12px;
    align-items:start;
  }
  .booth-card{
    background:#fff;border-radius:12px;overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
    transition:transform .15s;
  }
  .booth-card:active{transform:scale(.97)}
  .booth-card .thumb{
    width:100%;aspect-ratio:1/1;object-fit:cover;display:block;
    background:#eee;
  }
  .booth-card .info{padding:10px 12px 14px}
  .booth-card .booth-number{
    display:inline-block;background:#e91e63;color:#fff;
    font-size:11px;font-weight:700;padding:2px 7px;border-radius:10px;
    margin-bottom:4px;
  }
  .booth-card .game-name{font-size:15px;font-weight:700;margin-bottom:2px;line-height:1.3}
  .booth-card .booth-name{font-size:12px;color:#888;margin-bottom:6px}
  .booth-card .desc{font-size:12px;color:#555;line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    cursor:pointer;
  }
  .booth-card.expanded .desc{
    display:block;-webkit-line-clamp:unset;overflow:visible;
  }

  /* 지도 오버레이 */
  .map-overlay{
    position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.7);
    display:flex;align-items:center;justify-content:center;
    opacity:0;pointer-events:none;
    transition:opacity .25s;
  }
  .map-overlay.open{opacity:1;pointer-events:auto}
  .map-overlay-inner{
    width:92%;max-width:540px;background:#fff;border-radius:16px;
    overflow:hidden;position:relative;
    transform:translateY(30px);transition:transform .25s;
  }
  .map-overlay.open .map-overlay-inner{transform:translateY(0)}
  .map-overlay-inner img{width:100%;display:block}
  .map-overlay-info{text-align:center;padding:14px 12px;font-size:14px;color:#666;line-height:1.6}
  .map-overlay-close{
    position:absolute;top:10px;right:10px;
    width:32px;height:32px;border-radius:50%;border:none;
    background:rgba(0,0,0,.5);color:#fff;font-size:18px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
  }

  /* 모바일 1열 */
  @media(max-width:420px){
    .booth-grid{grid-template-columns:1fr;gap:10px;padding:10px}
    .booth-card{display:flex;flex-direction:row;align-items:stretch}
    .booth-card .thumb{width:120px;min-width:120px;aspect-ratio:1/1;border-radius:0}
    .booth-card .info{flex:1;display:flex;flex-direction:column;justify-content:center;padding:10px}
  }

  /* 태블릿 이상 3열 */
  @media(min-width:600px){
    .booth-grid{grid-template-columns:repeat(3,1fr)}
  }
</style>
</head>

const grid=document.getElementById('boothGrid');
const sortBtns=document.querySelectorAll('.sort-btn');
let sortMode=localStorage.getItem('sortMode')||'random';

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderGrid(){
  grid.innerHTML='';
  const list=sortMode==='number'?[...booths]:shuffle(booths);
  list.forEach(b=>{
    const card=document.createElement('div');
    card.className='booth-card';
    card.innerHTML=`
      <img class="thumb" src="${b.img}" alt="${b.game}" loading="lazy">
      <div class="info">
        <span class="booth-number">${b.n}번</span>
        <div class="game-name">${b.game}</div>
        <div class="booth-name">${b.booth}</div>
        <div class="desc">${b.desc}</div>
      </div>`;
    grid.appendChild(card);
  });
  sortBtns.forEach(b=>{
    b.classList.toggle('active',b.dataset.sort===sortMode);
  });
}

sortBtns.forEach(btn=>{
  btn.addEventListener('click',()=>{
    sortMode=btn.dataset.sort;
    localStorage.setItem('sortMode',sortMode);
    renderGrid();
  });
});

renderGrid();

// 카드 클릭 시 텍스트 펼치기/접기
grid.addEventListener('click',e=>{
  const card=e.target.closest('.booth-card');
  if(card) card.classList.toggle('expanded');
});

// 탭 전환
document.querySelectorAll('.tab-bar button[data-tab]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-bar button').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

// 지도 오버레이
const overlay=document.getElementById('mapOverlay');
document.getElementById('mapBtn').addEventListener('click',()=>overlay.classList.add('open'));
document.getElementById('mapClose').addEventListener('click',()=>overlay.classList.remove('open'));
overlay.addEventListener('click',e=>{if(e.target===overlay)overlay.classList.remove('open')});
</script>
</body>
