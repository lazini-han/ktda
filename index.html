<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTDA 행사 정보</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,'Noto Sans KR','Malgun Gothic',sans-serif;background:#f5f5f5;color:#333;padding-top:48px}

  .top-bar{
    position:fixed;top:0;left:0;right:0;z-index:100;
    max-width:720px;margin:0 auto;
    background:#e91e63;color:#fff;
    text-align:center;font-size:15px;font-weight:700;
    padding:13px 0;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }

  .content{max-width:504px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px}

  .event-card{
    display:block;text-decoration:none;color:#333;
    background:#fff;border-radius:14px;overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
    transition:transform .15s;
    padding:14px;
  }
  .event-card:active{transform:scale(.98)}
  .event-card img{width:100%;display:block;border-radius:10px}
  .event-card .card-body{padding:14px 4px 4px}
  .event-card .card-title{font-size:26px;font-weight:800;margin-bottom:4px}
  .event-card .card-desc{font-size:20px;color:#666;line-height:1.5}
  .event-card .card-arrow{float:right;font-size:20px;color:#e91e63;font-weight:700}
</style>
</head>
<body>

<header class="top-bar">KTDA 행사 정보</header>

<div class="content">
  <a class="event-card" href="2026festa/2026festa.html">
    <img src="2026festa/main.jpg" alt="2026 보드게임페스타 작가존">
    <div class="card-body">
      <div class="card-title">2026 보드게임페스타 작가존</div>
      <div class="card-desc">
        2026. 4. 11(토) ~ 4. 12(일) | 세텍 제3전시실
        <span class="card-arrow">바로가기 &rsaquo;</span>
      </div>
    </div>
  </a>
  <a class="event-card" href="https://boardgamefair.vercel.app/" target="_blank">
    <img src="https://ijfzdwqsefvzrepaetyn.supabase.co/storage/v1/object/public/announcements/26750abe-8ef1-46d8-a7e9-04b3238087be/e07f42b4-b14f-4d9a-b06b-6f8b51b3b6e5-1772001003339.png" alt="2026 서울보드게임페어">
    <div class="card-body">
      <div class="card-title">2026 서울보드게임페어</div>
      <div class="card-desc">
        2026. 3. 21(토) | 삼성역센터 리젠시홀
        <span class="card-arrow">바로가기 &rsaquo;</span>
      </div>
    </div>
  </a>
</div>

</body>
</html>
